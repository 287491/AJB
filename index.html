<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AJB</title>
    <style>
        :root{--brand:#0b69ff;--bg:#ffffff;--text:#0f1724}
        html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg)}
        header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.25rem;background:var(--brand);color:#fff;position:relative;z-index:1}
        .brand{display:flex;align-items:center;gap:.75rem}
        .logo{width:40px;height:40px;border-radius:8px;background:#fff;color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700}
        .site-title{margin:0;font-size:1rem}
        .menu-toggle{display:none;align-items:center;gap:.5rem;border:none;background:rgba(255,255,255,.15);color:#fff;padding:.6rem 1rem;border-radius:999px;cursor:pointer;font-weight:600;font-size:0.95rem}
        .menu-toggle .icon{font-size:1.2rem;line-height:1}
        nav{position:relative}
        .nav-list{display:flex;flex-wrap:wrap;align-items:center;gap:0.75rem;margin:0;padding:0;list-style:none}
        .nav-link{color:inherit;text-decoration:none;margin-left:0;font-weight:600;position:relative;padding-bottom:0}
        .nav-link::after{content:"";position:absolute;left:0;right:0;height:2px;background:currentColor;transform:scaleX(0);transform-origin:left center;transition:transform .22s cubic-bezier(.2,.9,.3,1)}
        .nav-link:hover::after{transform:scaleX(1)}
        .dropdown{display:none;position:absolute;top:calc(100% + .5rem);right:0;background:#fff;color:var(--text);border-radius:16px;box-shadow:0 18px 40px rgba(0,0,0,.12);padding:.75rem 1rem;min-width:180px}
        .dropdown.open{display:block}
        .dropdown .nav-link{display:block;padding:.6rem 0;color:var(--text)}
        @media (max-width:760px){
            header{justify-content:space-between;padding:1rem;}
            .menu-toggle{display:flex}
            .nav-list{display:none}
            .dropdown{right:0;left:0;width:100%}
            .dropdown.open{display:flex;flex-direction:column}
            .dropdown .nav-link{padding:.75rem 0}
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo">AJ</div>
            <h1 class="site-title">AJB</h1>
        </div>

        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-menu">
            <span>Menu</span>
            <span class="icon">☰</span>
        </button>

        <nav aria-label="Primary navigation">
            <ul class="nav-list">
                <li><a class="nav-link" href="#">Home</a></li>
                <li><a class="nav-link" href="#">About</a></li>
                <li><a class="nav-link" href="#">Contact</a></li>
            </ul>
            <div id="mobile-menu" class="dropdown" aria-hidden="true">
                <a class="nav-link" href="#">Home</a>
                <a class="nav-link" href="#">About</a>
                <a class="nav-link" href="#">Contact</a>
            </div>
        </nav>
    </header>

    <main></main>

    <script>
        const toggle = document.querySelector('.menu-toggle')
        const dropdown = document.getElementById('mobile-menu')

        toggle.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true'
            toggle.setAttribute('aria-expanded', String(!expanded))
            dropdown.classList.toggle('open')
            dropdown.setAttribute('aria-hidden', String(expanded))
        })

        document.addEventListener('click', event => {
            if (!toggle.contains(event.target) && !dropdown.contains(event.target)) {
                toggle.setAttribute('aria-expanded', 'false')
                dropdown.classList.remove('open')
                dropdown.setAttribute('aria-hidden', 'true')
            }
        })
    </script>
</body>
</html>
